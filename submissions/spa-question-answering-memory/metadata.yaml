name: spa-question-answering-memory
type: model
version: 0.2.0

authors:
  - name: Chris Eliasmith
    affiliation: University of Waterloo, CNRG
    orcid: 0000-0001-6308-7339

license: GPL-2.0-or-later

description: >
  A Semantic Pointer Architecture question-answering model that holds the
  bound colour-shape pair in a recurrent memory state, then unbinds with a
  cue presented after the inputs have gone quiet. Extends the plain SPA
  question-answering example with a spa.State(feedback=1) working memory.

