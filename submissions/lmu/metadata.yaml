name: lmu
type: network
version: 0.2.1

authors:
  - name: Aaron R. Voelker
    affiliation: Applied Brain Research / Waterloo, CNRG
  - name: Ivana Kajić
    affiliation: University of Waterloo, CNRG
  - name: Chris Eliasmith
    affiliation: University of Waterloo, CNRG
    orcid: 0000-0001-6308-7339

license: GPL-2.0-or-later

description: >
  A Legendre Memory Unit subnetwork for Nengo. A recurrent linear layer
  compresses a sliding window of a scalar input into a low-dimensional
  Legendre state; downstream readouts can then compute arbitrary linear
  or nonlinear functions of the windowed input. The headline example
  learns the windowed RMS via PES on a downstream spiking ensemble.

tags:
  - lmu
  - memory
  - recurrent
  - learning
  - pes
  - subnetwork

nengo_version: ">=3.2,<5"

backends:
  - core

dependencies:
  - numpy>=1.20
  - scipy>=1.5
  - matplotlib

complexity: advanced

paper:
  citation: "Voelker, A. R., Kajić, I., & Eliasmith, C. (2019). Legendre Memory Units: Continuous-time representation in recurrent neural networks. In NeurIPS 2019."
  url: https://papers.nips.cc/paper_files/paper/2019/hash/952285b9b7e7a1be5aa7849f32ffff05-Abstract.html

entry_point: examples/example_usage.py
discussion: 183

