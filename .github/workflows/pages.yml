name: Build & deploy site

# Builds the NengoZoo static site (tools/build_site.py) on every push to main,
# uploads it as a Pages artifact, and deploys to GitHub Pages.

on:
  push:
    branches: [main]
  # Rebuild after the Tier-1 review workflow finishes. review.yml's
  # aggregate-tested-on job commits .tested-on.json back to main using the
  # default GITHUB_TOKEN, and pushes made with that token DO NOT trigger
  # other workflows. Without this trigger, the site is built before the
  # tested-on file exists, then never rebuilt to render the badge.
  workflow_run:
    workflows: ["NengoZoo — Tier-1 Review", "Auto-create discussions"]
    branches: [main]
    types: [completed]
  workflow_dispatch:       # allow manual rebuilds from the Actions tab
  # Refresh on a 6-hour cadence so star/comment counts on the live site
  # don't drift too far from the truth during quiet periods (no merges /
  # no CI runs). On busy days the merge- and workflow_run-triggers do
  # the work, and this cron is effectively a no-op deploy.
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  discussions: read        # build_site.py queries Discussions via GraphQL
  pages: write
  id-token: write          # required by actions/deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # If we got here via workflow_run, only proceed when the upstream review
    # workflow actually succeeded — no point deploying a site that reflects
    # a failed CI run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        # Nengo is needed because build_site.py reuses the validator's
        # check_gui_shape, which imports the entry_point and checks for a
        # nengo.Network at module level. jsonschema is a transitive requirement
        # of validate_submission.py (it imports it at module top level and
        # sys.exits if missing). scipy/matplotlib catch submission entry-points
        # that import them at module level (lamprey uses scipy.integrate).
        run: |
          pip install --upgrade pip
          pip install pyyaml jinja2 markdown pygments "jsonschema>=4.18" \
                      "nengo>=4,<5" numpy scipy matplotlib

      - name: Build site
        # GITHUB_TOKEN lets build_site.py call the GraphQL API for
        # per-submission discussion stars + reply counts. GITHUB_REPOSITORY
        # is set automatically by Actions and tells the script which repo
        # to query. Both fall back gracefully (no badges) if absent.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tools/build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
