name: Build & deploy site

# Builds the NengoZoo static site (tools/build_site.py) on every push to main,
# uploads it as a Pages artifact, and deploys to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:       # allow manual rebuilds from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write          # required by actions/deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        # Nengo is needed because build_site.py reuses the validator's
        # check_gui_shape, which imports the entry_point and checks for a
        # nengo.Network at module level.
        run: |
          pip install --upgrade pip
          pip install pyyaml jinja2 markdown pygments "nengo>=4,<5" numpy

      - name: Build site
        run: python tools/build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
