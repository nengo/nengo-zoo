name: Mint Zenodo DOIs

# For each submission whose current version hasn't been deposited yet, mint a
# Zenodo DOI (per-submission concept + version lineage, via the REST API — NOT
# the repo-scoped native GitHub integration) and write the DOIs back into the
# submission's metadata.yaml. The site then renders a "Cite this submission"
# block from those fields.
#
# Points at Zenodo PRODUCTION — DOIs minted here are permanent and cannot be
# deleted. Needs the ZENODO_TOKEN secret (a zenodo.org personal token with
# deposit:write + deposit:actions). pages.yml's build-time DOI lookup must point
# at the same instance (zenodo.org/api).
#
# Two ways in:
#   * workflow_run after "Auto-tag submissions" — when a version bump merges,
#     auto-tag creates the tag, and we deposit on its completion. (A tag pushed
#     by GITHUB_TOKEN does not trigger `on: push: tags`, so we chain on
#     workflow completion instead.)
#   * workflow_dispatch — manual backfill. The script is idempotent: it only
#     deposits submissions whose version has moved past what's recorded.

on:
  workflow_run:
    workflows: ["Auto-tag submissions"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write       # commit the DOI write-backs to metadata.yaml

concurrency:
  group: "zenodo"
  cancel-in-progress: false

jobs:
  deposit:
    runs-on: ubuntu-latest
    # On workflow_run, only proceed when auto-tag actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml

      - name: Deposit new versions to Zenodo + write DOIs back
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_BASE_URL: https://zenodo.org/api
        run: python tools/sync_zenodo.py

      - name: Commit any newly-written DOIs
        # always() so a partial run (some submissions fail) still records the
        # ones that succeeded — re-runs then only retry the failures, and we
        # don't re-mint DOIs we already have.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add submissions/**/metadata.yaml
          if git diff --cached --quiet; then
            echo "No new DOIs to commit."
          else
            git commit -m "CI: record Zenodo DOIs for released versions"
            # Retry-with-rebase against concurrent bot pushes on main.
            # See review.yml's tested-on push step for the rationale.
            for attempt in 1 2 3 4 5; do
              if git push; then exit 0; fi
              if [ "$attempt" = "5" ]; then
                echo "Push failed after 5 attempts."
                exit 1
              fi
              echo "Push rejected (attempt $attempt/5) — rebasing on origin/main and retrying..."
              if ! git pull --rebase origin main; then
                echo "Rebase failed (likely a real conflict); cannot recover."
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
              sleep $((RANDOM % 3 + 1))
            done
          fi
